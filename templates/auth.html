<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SanReach - SMS Platform</title>
<style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
        display: flex;
        min-height: 100vh;
        background: linear-gradient(135deg, #ff4d4d, #1e3aff, #00c6ff); /* Red → Blue → Cyan */
        color: #fff;
    }

    /* Left info section */
    .info-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 60px;
        color: #ffffffcc;
    }

    .brand {
        font-size: 36px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
    }

    .brand span { font-size: 40px; }

    .tagline {
        font-size: 20px;
        margin-bottom: 30px;
    }

    .feature {
        margin-bottom: 20px;
        font-size: 16px;
        line-height: 1.5;
    }

    /* Right auth card */
    .auth-card {
        width: 360px;               /* Fixed width */
        max-width: 90%;             /* Responsive */
        background: rgba(255, 255, 255, 0.95);
        border-radius: 12px;
        padding: 30px 25px;
        margin: auto 60px;
        box-shadow: 0 7px 25px rgba(0,0,0,0.12);
        display: flex;
        flex-direction: column;
        justify-content: center;
        color: #0c4a6e;
    }

    .auth-card h2 {
        text-align: center;
        margin-bottom: 25px;
    }

    .message {
        text-align: center;
        color: #ef4444;
        margin-bottom: 15px;
        font-size: 14px;
        display: none;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    input {
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        border-color: #0ea5e9;
        box-shadow: 0 0 0 3px rgba(14,165,233,0.3);
    }

    button {
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #0ea5e9;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover { background: #0284c7; }

    .toggle {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .toggle a {
        color: #0ea5e9;
        cursor: pointer;
        font-weight: 600;
        text-decoration: none;
    }

    /* Responsive */
    @media(max-width: 900px) {
        body { flex-direction: column; }
        .info-section { display: none; }
        .auth-card { margin: 40px 20px; width: 90%; padding: 25px; }
    }
</style>
</head>
<body>

    <!-- Left brand/info section -->
    <div class="info-section">
        <div class="brand"><span>🚀📩</span> SanReach</div>
        <div class="tagline">Fast, Reliable SMS Platform for your business</div>
        <div class="feature">✅ Send SMS to customers instantly</div>
        <div class="feature">✅ Track SMS delivery and reports</div>
        <div class="feature">✅ Secure login & easy user management</div>
    </div>

    <!-- Right login/register card -->
    <div class="auth-card">
        <h2 id="formTitle">Login</h2>

        <div class="message" id="msg">Invalid username/password</div>

        <!-- Login form -->
        <form id="loginForm" method="POST" action="#">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- Register form -->
        <form id="registerForm" method="POST" action="#" style="display:none;">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>

        <div class="toggle">
            <span id="toggleText">
                Don’t have an account? <a onclick="toggleForms()">Register</a>
            </span>
        </div>
    </div>

    <script>
        function toggleForms() {
            const login = document.getElementById("loginForm");
            const register = document.getElementById("registerForm");
            const title = document.getElementById("formTitle");
            const toggleText = document.getElementById("toggleText");

            if (login.style.display === "none") {
                login.style.display = "flex";
                register.style.display = "none";
                title.innerText = "Login";
                toggleText.innerHTML = "Don’t have an account? <a onclick='toggleForms()'>Register</a>";
            } else {
                login.style.display = "none";
                register.style.display = "flex";
                title.innerText = "Create Account";
                toggleText.innerHTML = "Already have an account? <a onclick='toggleForms()'>Login</a>";
            }
        }
    </script>

</body>
</html>
