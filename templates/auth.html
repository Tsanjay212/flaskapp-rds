<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SanReach - Login</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: #1a2035; /* dark theme background */
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: #e0e0e0; /* optional: light text for contrast */
}

/* AUTH WRAPPER */
.auth-wrapper {
    width: 100%;
    max-width: 420px;
    padding: 20px;
}

/* BRAND - Dark Theme */
.brand {
    text-align: center;
    margin-bottom: 30px;
}

.brand h1 {
    font-size: 26px;
    font-weight: 600;
    color: #ffffff; /* bright white for strong contrast */
}

.brand p {
    font-size: 14px;
    color: #a0a0b5; /* muted light grayish-blue for secondary text */
    margin-top: 5px;
}

/* CARD - Dark Theme */
.auth-card {
    background: #cbcbd6;                  /* slightly lighter than body for contrast */
    color: #e5e7eb;                        /* light text for readability */
    padding: 35px;
    border-radius: 12px;                   /* slightly rounded corners for modern look */
    box-shadow: 0 8px 20px rgba(0,0,0,0.7); /* stronger shadow for depth */
}

.auth-card h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #ffffff;                        /* bright white for heading to pop */
}

.message {
    text-align: center;
    margin-bottom: 15px;
    font-size: 14px;
    font-weight: 500;
    color: #ffd166;                        /* warm accent color for flash messages */
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
}

input {
    padding: 11px 12px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: #2563eb;
}

/* BUTTON */
button {
    padding: 11px;
    border: none;
    border-radius: 6px;
    background: #2563eb;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #1d4ed8;
}

/* TOGGLE */
.toggle {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.toggle a {
    color: #2563eb;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
}

.toggle a:hover {
    text-decoration: underline;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #9ca3af;
}
</style>
</head>

<body>

<div class="auth-wrapper">

    <!-- Brand -->
    <div class="brand">
        <h1>🚀 SanReach</h1>
        <p>Fast & Reliable SMS Platform</p>
    </div>

    <!-- Card -->
    <div class="auth-card">
        <h2 id="formTitle">Login</h2>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="message"
                   style="color: {% if category=='danger' %}#dc2626{% else %}#16a34a{% endif %};">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Login Form -->
        <form id="loginForm" method="POST" action="{{ url_for('login') }}">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" method="POST" action="{{ url_for('register') }}" style="display:none;">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>

        <div class="toggle">
            <span id="toggleText">
                Don’t have an account? <a onclick="toggleForms()">Register</a>
            </span>
        </div>
    </div>

    <div class="footer">
        © 2026 SanReach. All rights reserved.
    </div>

</div>

<script>
function toggleForms() {
    const login = document.getElementById("loginForm");
    const register = document.getElementById("registerForm");
    const title = document.getElementById("formTitle");
    const toggleText = document.getElementById("toggleText");

    if (login.style.display === "none") {
        login.style.display = "flex";
        register.style.display = "none";
        title.innerText = "Login";
        toggleText.innerHTML =
            "Don’t have an account? <a onclick='toggleForms()'>Register</a>";
    } else {
        login.style.display = "none";
        register.style.display = "flex";
        title.innerText = "Create Account";
        toggleText.innerHTML =
            "Already have an account? <a onclick='toggleForms()'>Login</a>";
    }
}

// Auto-switch to Register form if registration failed
{% if request.endpoint == 'register' and messages %}
toggleForms();
{% endif %}
</script>

</body>
</html>
